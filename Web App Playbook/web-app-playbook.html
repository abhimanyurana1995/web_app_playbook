<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web App Playbook — HTML · CSS · JS · Python · SQL</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --html:#C2410C;--html-bg:#FFF7ED;--html-lt:#FED7AA;
  --css:#1D4ED8;--css-bg:#EFF6FF;--css-lt:#BFDBFE;
  --js:#B45309;--js-bg:#FFFBEB;--js-lt:#FDE68A;
  --py:#15803D;--py-bg:#F0FDF4;--py-lt:#BBF7D0;
  --sql:#6D28D9;--sql-bg:#F5F3FF;--sql-lt:#DDD6FE;
  --connect:#BE185D;--connect-bg:#FDF2F8;--connect-lt:#FBCFE8;
  --radius:16px;--shadow:0 4px 24px rgba(0,0,0,.10);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#F4EFE6;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9bfa8' fill-opacity='0.35'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-.5zm-2 0v.5H4v-2h14v1.5zM4 0v2h2V0H4zm4 0v2h2V0H8zm4 0v2h2V0h-2z'/%3E%3C/g%3E%3C/svg%3E");color:#111827;min-height:100vh;padding-bottom:80px}

/* ── Header ── */
.site-header{background:#fff;border-bottom:4px solid #111;padding:16px 32px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 16px rgba(0,0,0,.12)}
.logo-stack{display:flex;gap:6px;align-items:center}
.logo-pill{padding:4px 10px;border-radius:8px;font-weight:900;font-size:0.85rem;color:#fff;letter-spacing:.5px}
.pill-html{background:var(--html)}.pill-css{background:var(--css)}.pill-js{background:var(--js)}.pill-py{background:var(--py)}.pill-sql{background:var(--sql)}
.header-title{font-size:1.35rem;font-weight:900;letter-spacing:-0.5px}
.header-sub{font-size:0.8rem;color:#777;font-style:italic;margin-top:1px}

/* ── Tabs ── */
.tech-tabs{display:flex;gap:0;padding:28px 32px 0;overflow-x:auto;scrollbar-width:none}
.tech-tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:12px 22px;border:3px solid #111;border-bottom:none;border-radius:14px 14px 0 0;background:#e0d9ce;font-size:.9rem;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;margin-right:3px;color:#555}
.tab-btn.active{background:#fff;transform:translateY(3px);color:#111}
.tab-btn[data-tab="html"].active{border-color:var(--html);color:var(--html)}
.tab-btn[data-tab="css"].active{border-color:var(--css);color:var(--css)}
.tab-btn[data-tab="js"].active{border-color:var(--js);color:var(--js)}
.tab-btn[data-tab="python"].active{border-color:var(--py);color:var(--py)}
.tab-btn[data-tab="sql"].active{border-color:var(--sql);color:var(--sql)}
.tab-btn[data-tab="connect"].active{border-color:var(--connect);color:var(--connect)}

/* ── Panel ── */
.tab-panel{display:none;background:#fff;border:3px solid #111;border-radius:0 16px 16px 16px;margin:0 32px;padding:32px}
.tab-panel.active{display:block}
.tab-panel[data-tab="html"]{border-color:var(--html)}
.tab-panel[data-tab="css"]{border-color:var(--css)}
.tab-panel[data-tab="js"]{border-color:var(--js)}
.tab-panel[data-tab="python"]{border-color:var(--py)}
.tab-panel[data-tab="sql"]{border-color:var(--sql)}
.tab-panel[data-tab="connect"]{border-color:var(--connect)}

.panel-intro{display:flex;align-items:flex-start;gap:20px;margin-bottom:32px;padding-bottom:24px;border-bottom:2px dashed #e5e7eb}
.panel-intro .big-em{font-size:4rem;line-height:1;flex-shrink:0}
.panel-intro h2{font-size:1.8rem;font-weight:900;letter-spacing:-1px}
.panel-intro p{font-size:.97rem;color:#555;margin-top:6px;line-height:1.55;max-width:580px}
.analogy-pill{display:inline-block;background:#FEF3C7;border:2px solid #F59E0B;border-radius:8px;padding:5px 12px;font-size:.85rem;font-weight:700;color:#92400E;margin-top:8px}

/* ── Topic Grid ── */
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.topic-card{border-radius:14px;border:2.5px solid #111;background:#fff;padding:18px 16px;cursor:pointer;transition:transform .15s,box-shadow .15s;user-select:none}
.topic-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.13)}
.topic-card .tc-emoji{font-size:2rem;margin-bottom:8px}
.topic-card .tc-name{font-size:1rem;font-weight:800;line-height:1.2}
.topic-card .tc-sub{font-size:.78rem;color:#777;margin-top:4px;font-weight:500}
.topic-card .tc-arrow{font-size:.8rem;color:#bbb;margin-top:8px;font-weight:700}

/* color the card header strip by tech */
[data-tab="html"]    .topic-card{border-color:var(--html);background:var(--html-bg)}
[data-tab="css"]     .topic-card{border-color:var(--css);background:var(--css-bg)}
[data-tab="js"]      .topic-card{border-color:var(--js);background:var(--js-bg)}
[data-tab="python"]  .topic-card{border-color:var(--py);background:var(--py-bg)}
[data-tab="sql"]     .topic-card{border-color:var(--sql);background:var(--sql-bg)}
[data-tab="connect"] .topic-card{border-color:var(--connect);background:var(--connect-bg)}

/* ── Slide Panel ── */
.overlay{visibility:hidden;pointer-events:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;opacity:0;transition:opacity .25s,visibility .25s}
.overlay.open{visibility:visible;pointer-events:auto;opacity:1}
.detail-panel{position:fixed;top:0;right:-780px;width:min(760px,100vw);height:100vh;background:#fff;border-left:4px solid #111;z-index:400;overflow-y:auto;transition:right .3s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(0,0,0,.15)}
.detail-panel.open{right:0}
.dp-header{padding:24px 28px 18px;border-bottom:3px solid #f0f0f0;position:sticky;top:0;background:#fff;z-index:10;display:flex;align-items:center;gap:14px}
.dp-header .dp-emoji{font-size:2.4rem;line-height:1}
.dp-header .dp-title{font-size:1.5rem;font-weight:900;letter-spacing:-0.5px}
.dp-header .dp-sub{font-size:.82rem;color:#777;margin-top:2px}
.dp-close{margin-left:auto;width:38px;height:38px;border-radius:50%;border:2.5px solid #ddd;background:#f9f9f9;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;transition:background .15s}
.dp-close:hover{background:#fee2e2;border-color:#f87171}
.dp-body{padding:24px 28px 48px}

/* ── Detail Section Types ── */
.ds-intro{background:#f9fafb;border-left:4px solid #ddd;border-radius:0 10px 10px 0;padding:14px 18px;font-size:.97rem;font-style:italic;color:#374151;margin-bottom:20px;line-height:1.6}
.ds-heading{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:#888;margin:24px 0 12px;display:flex;align-items:center;gap:8px}
.ds-heading::after{content:'';flex:1;height:1.5px;background:#eee}
.ds-p{font-size:.95rem;line-height:1.65;color:#333;margin-bottom:12px}
.ds-table{width:100%;border-collapse:collapse;font-size:.88rem;margin-bottom:16px}
.ds-table th{background:#f3f4f6;padding:9px 12px;text-align:left;font-weight:700;border:1.5px solid #e5e7eb;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px;color:#555}
.ds-table td{padding:9px 12px;border:1.5px solid #e5e7eb;vertical-align:top;line-height:1.45}
.ds-table tr:nth-child(even) td{background:#fafafa}
.ds-code{background:#1e1e2e;color:#cdd6f4;border-radius:12px;padding:18px 20px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:.85rem;line-height:1.7;margin-bottom:16px;overflow-x:auto;white-space:pre}

.ds-ai{background:#EDE9FE;border:2px solid #7C3AED;border-radius:12px;padding:16px 18px;margin-bottom:16px}
.ds-ai .ai-label{font-size:.75rem;font-weight:900;text-transform:uppercase;letter-spacing:1.5px;color:#6D28D9;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.ds-ai ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.ds-ai li{font-size:.9rem;color:#3730A3;background:#fff;border-radius:8px;padding:7px 12px;border-left:3px solid #7C3AED;line-height:1.4}

.ds-rule{background:#FFFBEB;border:2px solid #F59E0B;border-radius:12px;padding:14px 18px;margin-bottom:14px}
.ds-rule .rule-q{font-weight:700;color:#92400E;margin-bottom:6px;font-size:.95rem}
.ds-rule .rule-a{font-size:.9rem;color:#78350F;line-height:1.5}

.ds-types{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:16px}
.ds-type-card{border-radius:10px;border:2px solid;padding:12px 14px}
.ds-type-card .type-name{font-size:.9rem;font-weight:800;margin-bottom:4px}
.ds-type-card .type-eg{font-family:monospace;font-size:.82rem;background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;margin-bottom:6px;display:inline-block}
.ds-type-card .type-when{font-size:.78rem;color:#555;line-height:1.4}

.ds-warn{background:#FEF2F2;border:2px solid #FCA5A5;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:.88rem;color:#991B1B;line-height:1.5}
.ds-tip{background:#F0FDF4;border:2px solid #86EFAC;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:.88rem;color:#166534;line-height:1.5}

@media(max-width:768px){
  .tech-tabs,.tab-panel{margin:0 12px}
  .tab-panel{padding:20px 16px}
  .site-header{padding:12px 16px}
  .topic-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
  .dp-body,.dp-header{padding-left:18px;padding-right:18px}
}
</style>
</head>
<body>

<header class="site-header">
  <div class="logo-stack">
    <span class="logo-pill pill-html">HTML</span>
    <span class="logo-pill pill-css">CSS</span>
    <span class="logo-pill pill-js">JS</span>
    <span class="logo-pill pill-py">Python</span>
    <span class="logo-pill pill-sql">SQL</span>
  </div>
  <div>
    <div class="header-title">Web App Playbook</div>
    <div class="header-sub">Click any card to deep dive — your AI orchestrator cheat sheet</div>
  </div>
</header>

<div class="tech-tabs">
  <button class="tab-btn active" data-tab="python" onclick="showTab('python')">🐍 Python</button>
  <button class="tab-btn" data-tab="sql"    onclick="showTab('sql')">🗄️ SQL</button>
  <button class="tab-btn" data-tab="html"   onclick="showTab('html')">🟧 HTML</button>
  <button class="tab-btn" data-tab="css"    onclick="showTab('css')">🎨 CSS</button>
  <button class="tab-btn" data-tab="js"     onclick="showTab('js')">⚡ JavaScript</button>
  <button class="tab-btn" data-tab="connect" onclick="showTab('connect')">🔗 How They Connect</button>
</div>

<!-- Panels are rendered by JS -->
<div id="panels-container"></div>

<!-- Slide-in panel -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="detail-panel" id="detailPanel">
  <div class="dp-header" id="dpHeader"></div>
  <div class="dp-body"   id="dpBody"></div>
</div>

<script>

`# Check any variable's type
type(42)          # <class 'int'>
type("hello")     # <class 'str'>

# Convert between types
int("42")         # → 42  (string to int)

        {t:'intro', c:'A variable is just a label you stick on a piece of data. Python figures out the type automatically — you just write the name, equals, and the value.'},
        {t:'heading', c:'Naming Rules'},
        {t:'p', c:'Python uses snake_case (words separated by underscores). Be descriptive — code is read more than it\'s written.'},
        {t:'code', c:
`# ✓ Good names
user_name = "Alice"
total_price = 99.99
is_logged_in = True

# ✗ Bad names

# Multiple assignment

greeting = f"Hello, {name}! You are {age} years old."

# Essential string methods

          ]

        {t:'tip', c:'✓ Open browser DevTools with F12. The Console tab shows JS errors. The Network tab shows every HTTP request and the exact response from your server. These two tabs solve 80% of frontend problems.'},
      ]
    },
  ]
},

}; // end TECH

/* ═══════════════════════════════════════════════════════
   RENDERING ENGINE
═══════════════════════════════════════════════════════ */

function renderPanels() {
  const container = document.getElementById("panels-container");
  for (const [key, tech] of Object.entries(TECH)) {
    const panel = document.createElement("div");
    panel.className = "tab-panel" + (key === "python" ? " active" : "");
    panel.dataset.tab = key;
    panel.innerHTML = `
      <div class="panel-intro">
        <div class="big-em">${tech.emoji}</div>
        <div>
          <h2 style="color:${tech.color}">${tech.label}</h2>
          <p>${tech.intro}</p>
          <span class="analogy-pill">${tech.analogy}</span>
        </div>
      </div>
      <div class="topic-grid">
        ${tech.topics.map(t => `
          <div class="topic-card" onclick="openTopic('${key}','${t.id}')">
            <div class="tc-emoji">${t.emoji}</div>
            <div class="tc-name">${t.name}</div>
            <div class="tc-sub">${t.sub}</div>
            <div class="tc-arrow">Click to explore →</div>
          </div>
        `).join("")}
      </div>`;
    container.appendChild(panel);
  }
}

function showTab(tab) {
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
  document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add("active");
  document.querySelector(`.tab-panel[data-tab="${tab}"]`).classList.add("active");
}

function openTopic(techKey, topicId) {
  const tech  = TECH[techKey];
  const topic = tech.topics.find(t => t.id === topicId);
  if (!topic) return;

  const header = document.getElementById("dpHeader");
  const body   = document.getElementById("dpBody");

  header.innerHTML = `
    <div class="dp-emoji">${topic.emoji}</div>
    <div>
      <div class="dp-title" style="color:${tech.color}">${topic.name}</div>
      <div class="dp-sub">${tech.label} · ${topic.sub}</div>
    </div>
    <button class="dp-close" onclick="closePanel()">✕</button>`;

  body.innerHTML = topic.sections.map(sec => renderSection(sec)).join("");

  document.getElementById("overlay").classList.add("open");
  document.getElementById("detailPanel").classList.add("open");
  document.body.style.overflow = "hidden";
}

function renderSection(sec) {
  switch(sec.t) {
    case "intro":
      return `<div class="ds-intro">${sec.c}</div>`;
    case "heading":
      return `<div class="ds-heading">${sec.c}</div>`;
    case "p":
      return `<p class="ds-p">${sec.c}</p>`;
    case "warn":
      return `<div class="ds-warn">${sec.c}</div>`;
    case "tip":
      return `<div class="ds-tip">${sec.c}</div>`;
    case "code":
      return `<pre class="ds-code">${escHtml(sec.c)}</pre>`;
    case "ai":
      return `<div class="ds-ai">
        <div class="ai-label">🤖 Tell AI to...</div>
        <ul>${sec.items.map(i=>`<li>${i}</li>`).join("")}</ul>
      </div>`;
    case "rule":
      return `<div class="ds-rule">
        <div class="rule-q">❓ ${sec.q}</div>
        <div class="rule-a">${sec.a}</div>
      </div>`;
    case "table":
      return `<table class="ds-table">
        <thead><tr>${sec.heads.map(h=>`<th>${h}</th>`).join("")}</tr></thead>
        <tbody>${sec.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
      </table>`;
    case "types":
      return `<div class="ds-types">${sec.items.map(i=>`
        <div class="ds-type-card" style="background:${i.color};border-color:${i.border}">
          <div class="type-name">${i.name}</div>
          <div class="type-eg">${i.eg}</div>
          <div class="type-when">${i.when}</div>
        </div>`).join("")}</div>`;
    default: return "";
  }
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function closePanel() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("detailPanel").classList.remove("open");
  document.body.style.overflow = "";
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closePanel(); });
renderPanels();
</script>
</body>
</html>
